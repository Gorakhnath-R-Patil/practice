# ── Base configuration — shared across ALL profiles ───────────────────────────
#
# Contains only settings that NEVER change between environments.
# Profile files (application-dev/test/qa.yml) provide environment-specific
# values. Spring Boot merge order (highest wins):
#   application.yml  ←  application-{profile}.yml  ←  env vars
#
# Activate a profile:
#   SPRING_PROFILES_ACTIVE=dev   mvn spring-boot:run   (local development)
#   SPRING_PROFILES_ACTIVE=test  (CI / integration test environment)
#   SPRING_PROFILES_ACTIVE=qa    (QA server — all values from env vars)
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8082

spring:
  application:
    name: consumer-service

  datasource:
    driver-class-name: org.postgresql.Driver   # fixed — always PostgreSQL

  jpa:
    hibernate:
      ddl-auto: update        # auto-create / update customers table on startup
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  batch:
    jdbc:
      initialize-schema: always   # auto-create Spring Batch metadata tables
    job:
      enabled: false              # jobs triggered programmatically, not on startup

  kafka:
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false   # required — Spring Kafka controls offset commits during retry routing

# ── Kafka topic names ─────────────────────────────────────────────────────────
kafka:
  topic:
    customers: healthcare.customers

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: consumer-service
    description: Consumes Kafka messages via Spring Batch and persists customers to Postgres
