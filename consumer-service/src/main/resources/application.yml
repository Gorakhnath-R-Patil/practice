server:
  port: 8082

spring:
  application:
    name: consumer-service

  # Single PostgreSQL datasource — used by both JPA (entities) and Spring Batch (metadata)
  # Env vars override when running inside Docker (set in docker-compose)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthcare_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # auto-create / update customers table
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  batch:
    jdbc:
      initialize-schema: always   # auto-create Spring Batch metadata tables in Postgres
    job:
      enabled: false              # jobs triggered programmatically

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: healthcare-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false   # required for @RetryableTopic to control offset commits

kafka:
  topic:
    customers: healthcare.customers

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,httptrace
      base-path: /actuator
  endpoint:
    health:
      show-details: always   # shows DB, Kafka, disk-space sub-indicators
  info:
    env:
      enabled: true

info:
  app:
    name: consumer-service
    description: Consumes Kafka messages via Spring Batch and persists customers to Postgres
