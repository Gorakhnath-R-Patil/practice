# ── Consumer Service — Deployment + Service ───────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-service
  namespace: {{ .Values.namespace }}
  labels:
    app: consumer-service
    {{- include "healthcare.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-service
  template:
    metadata:
      labels:
        app: consumer-service
    spec:
      containers:
        - name: consumer-service
          image: {{ .Values.consumer.image }}
          imagePullPolicy: {{ .Values.consumer.imagePullPolicy }}
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.profile | quote }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/{{ .Values.postgres.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.consumer.resources | nindent 12 }}

---

apiVersion: v1
kind: Service
metadata:
  name: consumer-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: consumer-service
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: {{ .Values.consumer.nodePort }}
