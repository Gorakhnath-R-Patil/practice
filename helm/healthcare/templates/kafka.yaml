# ── Strimzi Kafka Cluster (KRaft mode, Strimzi 0.40+) ────────────────────────
#
# Strimzi 0.40+ uses KafkaNodePool resources for KRaft (ZooKeeper-free) mode.
# Two annotations on the Kafka CR activate this:
#   strimzi.io/node-pools: enabled  — delegate broker/controller to KafkaNodePool
#   strimzi.io/kraft:      enabled  — enable KRaft (no ZooKeeper)
#
# For single-node Minikube a single KafkaNodePool carries BOTH roles (controller+broker).
#
# Strimzi auto-provisions:
#   healthcare-kafka-bootstrap   ClusterIP  9092  (clients: Spring services, Kafka UI)
#   healthcare-kafka-brokers     ClusterIP  None  (headless, internal)
#   healthcare-dual-role-0       Pod        (combined controller + broker)
#   healthcare-entity-operator   Deployment (reconciles KafkaTopic CRs)
#
# Bootstrap URL injected into all consumers/producers:
#   healthcare-kafka-bootstrap:9092
# ─────────────────────────────────────────────────────────────────────────────

# 1. KafkaNodePool — combined controller + broker (single node for Minikube)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: healthcare
    {{- include "healthcare.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  resources:
    {{- toYaml .Values.kafka.resources | nindent 4 }}

---

# 2. Kafka CR — KRaft mode activated by annotations
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: healthcare
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
  annotations:
    strimzi.io/node-pools: enabled   # delegate replicas/storage/roles to KafkaNodePool
    strimzi.io/kraft: enabled        # enable KRaft — no ZooKeeper
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    metadataVersion: {{ .Values.kafka.metadataVersion }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
      log.retention.hours: "24"
      auto.create.topics.enable: "false"
  entityOperator:
    topicOperator: {}
