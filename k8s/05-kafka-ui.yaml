# ── Kafka UI — Deployment + Service ──────────────────────────────────────────
#
# Kafka UI is a web dashboard to browse topics, messages, and consumer groups.
# It's stateless — no storage needed, just a Deployment.
#
# Access: minikube service kafka-ui -n healthcare
#
# Apply:  kubectl apply -f k8s/05-kafka-ui.yaml
# Verify: kubectl get pods -n healthcare -l app=kafka-ui
# ─────────────────────────────────────────────────────────────────────────────


# ── 1. Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: healthcare
  labels:
    app: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            # Tell Kafka UI which cluster to connect to.
            # "kafka:29092" resolves via Kubernetes DNS to the kafka Service.
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka:29092"
            # No ZOOKEEPER entry — KRaft mode doesn't use ZooKeeper
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"

---

# ── 2. Service ────────────────────────────────────────────────────────────────
#
# type: NodePort → makes the Service reachable from OUTSIDE the cluster.
# Kubernetes assigns a port in the 30000-32767 range on every node.
# With Minikube: minikube service kafka-ui -n healthcare
#                opens the browser or prints the URL automatically.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
    - port: 8080        # Port the Service exposes inside the cluster
      targetPort: 8080  # Port on the pod
      nodePort: 30080   # Port on the Minikube node (access from host browser)
