# ── Base configuration — shared across ALL profiles ───────────────────────────
#
# This file contains only settings that NEVER change between environments:
# server port, multipart limits, Kafka topic names, Actuator exposure.
#
# Environment-specific settings (datasource URL, Kafka URL, log levels) live
# in the profile files below. Spring Boot merges them at startup:
#   application.yml  ←  application-{profile}.yml  ←  env vars  (highest wins)
#
# Activate a profile:
#   SPRING_PROFILES_ACTIVE=dev   mvn spring-boot:run   (local development)
#   SPRING_PROFILES_ACTIVE=test  (CI / integration test environment)
#   SPRING_PROFILES_ACTIVE=qa    (QA server — all values from env vars)
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8081

spring:
  application:
    name: csv-producer-service

  datasource:
    driver-class-name: org.postgresql.Driver   # fixed — always PostgreSQL

  batch:
    jdbc:
      initialize-schema: always   # auto-create Spring Batch metadata tables
    job:
      enabled: false              # do NOT auto-run on startup; trigger via REST

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ── Kafka topic names ─────────────────────────────────────────────────────────
# Topic names are application constants — they don't change per environment.
kafka:
  topic:
    customers: healthcare.customers

# ── Actuator — expose all useful endpoints ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always   # shows DB, Kafka, disk-space sub-indicators
  info:
    env:
      enabled: true

info:
  app:
    name: csv-producer-service
    description: Reads CSV files via Spring Batch and publishes records to Kafka
