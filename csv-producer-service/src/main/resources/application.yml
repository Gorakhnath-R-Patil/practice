server:
  port: 8081

spring:
  application:
    name: csv-producer-service

  # H2 in-memory DB for Spring Batch metadata (JobRepository)
  datasource:
    url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    jdbc:
      initialize-schema: always   # auto-create batch metadata tables
    job:
      enabled: false              # do NOT auto-run on startup; trigger via REST

  kafka:
    bootstrap-servers: localhost:9092

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

kafka:
  topic:
    customers: healthcare.customers
